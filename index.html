<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIELKI EVENT 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#1e90ff;--bg:#0a0a0a;--card:#141414}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:#fff;font-family:Inter,system-ui;text-align:center}
  header{padding:20px}
  .fire-text{
    font-family:'Anton',sans-serif;
    font-size:clamp(50px,12vw,140px);
    letter-spacing:3px;
    margin:0;
    color:#fff;
    animation: swing 2.5s ease-in-out infinite alternate, flicker 0.1s infinite alternate;
    text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 -10px 20px #ff7a00, 0 -20px 40px #ff2200, 0 -30px 60px #ff0000;
  }
  @keyframes swing{ from{transform:translateX(-15px) rotate(-1deg)} to{transform:translateX(15px) rotate(1deg)} }
  @keyframes flicker{ from{opacity:.95} to{opacity:1} }

  #countdown{font-size:clamp(22px,4vw,40px);font-weight:700;margin:10px 0 30px}
  .card{background:var(--card);margin:15px auto;padding:20px;border-radius:16px;max-width:700px;box-shadow:0 0 20px #000}
  a{color:#7cc4ff}
  .btn-blue{background:var(--blue);color:white;border:none;padding:14px 28px;font-size:18px;border-radius:12px;cursor:pointer;margin:10px;transition:.2s}
  .btn-blue:hover{transform:scale(1.05);box-shadow:0 0 20px var(--blue)}
  
  /* LOGIN */
  #login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:1000}
  #login-box{background:#111;padding:30px;border-radius:20px;max-width:420px;width:90%;box-shadow:0 0 30px red}
  #login-box input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;font-size:16px}
  .palette{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:10px 0}
  .color-dot{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s}
  .color-dot.taken{opacity:.2;cursor:not-allowed;position:relative}
  .color-dot.taken:after{content:'✕';position:absolute;inset:0;display:grid;place-items:center;color:white;font-weight:bold}
  .color-dot.selected{border-color:white;transform:scale(1.1);box-shadow:0 0 10px #fff}
  #color-info{font-size:13px;min-height:20px;color:#ffaa00}

  /* BANER */
  #bannerModal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:500}
  #bannerModal img{max-width:90%;max-height:80vh;border-radius:12px;box-shadow:0 0 40px #000}

  /* CZAT */
  #chatBox{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:700px;height:70vh;background:#0f0f0f;border-top-left-radius:16px;border-top-right-radius:16px;display:none;flex-direction:column;z-index:400;box-shadow:0 -5px 30px #000}
  #chatBox.open{display:flex}
  #messages{flex:1;overflow-y:auto;padding:15px;text-align:left}
  .msg{margin:6px 0} .msg b{font-weight:700}
  #chat-form{display:flex;padding:10px;gap:8px;border-top:1px solid #222}
  #chat-form input{flex:1;padding:12px;border-radius:8px;border:none;background:#222;color:white}
</style>
</head>
<body>

<div id="login-overlay" style="display:none">
  <div id="login-box">
    <h2>Wejdź na EVENT</h2>
    <p>Wybierz pseudonim i unikalny kolor nicku</p>
    <input id="nickInput" placeholder="Twój pseudonim" maxlength="16">
    <div class="palette" id="palette"></div>
    <input type="color" id="customColor" value="#ff0000" title="Własny kolor HTML">
    <div id="color-info"></div>
    <button class="btn-blue" id="joinBtn">DOŁĄCZ</button>
  </div>
</div>

<header><h1 class="fire-text">WIELKI EVENT</h1></header>

<div id="countdown">Ładowanie...</div>

<div class="card">
  <h3>Dane Eventu</h3>
  <p><b>Miejsce:</b> <a href="https://maps.app.goo.gl/S7bJ817h2Nqgwkra8" target="_blank">Osiedle Barskie, Nowy Sącz</a></p>
  <p><b>Data:</b> 3 sierpnia 2026, godz. 10:00</p>
</div>

<button class="btn-blue" id="bannerBtn">baner eventu</button>
<button class="btn-blue" id="chatBtn">czat grupowy</button>

<div id="bannerModal">
  <img src="foty/baner_event.jpg" alt="Baner Eventu">
  <a href="foty/baner_event.jpg" download="baner_event.jpg" class="btn-blue">pobierz baner do galerii</a>
  <button class="btn-blue" onclick="bannerModal.style.display='none'">zamknij</button>
</div>

<div id="chatBox">
  <div style="padding:10px;background:#1a1a1a;font-weight:700">CZAT GRUPOWY <span id="myNick" style="float:right"></span></div>
  <div id="messages"></div>
  <form id="chat-form">
    <input id="msgInput" placeholder="Napisz wiadomość..." autocomplete="off">
    <button class="btn-blue" type="submit">Wyślij</button>
  </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ==== WSTAW SWÓJ CONFIG Z FIREBASE ====
  const firebaseConfig = {
    apiKey: "TWOJ_API_KEY",
    authDomain: "event1000osob.firebaseapp.com",
    databaseURL: "https://event1000osob-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "event1000osob",
    storageBucket: "event1000osob.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };
  // =======================================
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const loginOverlay = document.getElementById('login-overlay');
  const paletteEl = document.getElementById('palette');
  const customColor = document.getElementById('customColor');
  const colorInfo = document.getElementById('color-info');
  const nickInput = document.getElementById('nickInput');
  
  let user = JSON.parse(localStorage.getItem('event_user') || 'null');
  let usedColors = [];
  let selectedColor = '#ff0000';

  const htmlColors = ['#FF0000','#FF4500','#FFA500','#FFD700','#FFFF00','#ADFF2F','#00FF00','#00FA9A','#00FFFF','#00BFFF','#1E90FF','#0000FF','#8A2BE2','#DA70D6','#FF00FF','#FF1493','#FFFFFF','#C0C0C0','#808080','#000000'];

  function renderPalette(){
    paletteEl.innerHTML='';
    htmlColors.forEach(c=>{
      const d=document.createElement('div');
      d.className='color-dot'; d.style.background=c;
      if(usedColors.includes(c.toLowerCase())) d.classList.add('taken');
      if(c.toLowerCase()===selectedColor.toLowerCase()) d.classList.add('selected');
      d.onclick=()=>{
        if(d.classList.contains('taken')){
          const prop = proposeColor(c, usedColors);
          selectedColor = prop; customColor.value = prop;
          colorInfo.textContent = `Kolor zajęty! Proponuję podobny: ${prop}`;
          renderPalette();
        } else { selectedColor=c; customColor.value=c; colorInfo.textContent=''; renderPalette(); }
      };
      paletteEl.appendChild(d);
    })
  }
  function proposeColor(hex, used){
    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    for(let i=0;i<300;i++){
      let newHex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
      if(!used.includes(newHex.toLowerCase())) return newHex.toUpperCase();
      b = (b+11)%256; if(i%10===0) g=(g+7)%256; if(i%20===0) r=(r+5)%256;
    }
    return hex;
  }
  customColor.oninput = e=>{ selectedColor = e.target.value; renderPalette(); }

  onValue(ref(db,'users'), snap=>{
    usedColors = Object.values(snap.val()||{}).map(u=>u.color.toLowerCase());
    renderPalette();
  });

  function showLogin(){ loginOverlay.style.display='flex'; }
  function hideLogin(){ loginOverlay.style.display='none'; }

  if(!user){ showLogin(); } else { document.getElementById('myNick').textContent = user.nick; document.getElementById('myNick').style.color = user.color; }

  document.getElementById('joinBtn').onclick = async ()=>{
    const nick = nickInput.value.trim();
    if(nick.length<3) return alert('Min. 3 znaki');
    if(usedColors.includes(selectedColor.toLowerCase())){
      selectedColor = proposeColor(selectedColor, usedColors);
      alert('Twój kolor był zajęty w międzyczasie! Dostałeś: '+selectedColor);
    }
    const uid = localStorage.getItem('event_uid') || crypto.randomUUID();
    localStorage.setItem('event_uid', uid);
    user = {uid, nick, color:selectedColor};
    await set(ref(db, 'users/'+uid), {...user, createdAt: Date.now()});
    localStorage.setItem('event_user', JSON.stringify(user));
    hideLogin();
    document.getElementById('myNick').textContent = nick;
    document.getElementById('myNick').style.color = selectedColor;
    if(window.pendingChat) openChat();
  };

  // ODLICZANIE
  const target = new Date('2026-08-03T10:00:00').getTime();
  setInterval(()=>{
    const d = target - Date.now();
    if(d<0){document.getElementById('countdown').textContent='EVENT TRWA!';return}
    const dn=Math.floor(d/86400000), h=Math.floor(d%86400000/3600000), m=Math.floor(d%3600000/60000), s=Math.floor(d%60000/1000);
    document.getElementById('countdown').textContent = `${dn} dni ${h}h ${m}m ${s}s`;
  },1000);

  // BANER
  const bannerModal = document.getElementById('bannerModal');
  document.getElementById('bannerBtn').onclick = ()=> bannerModal.style.display='flex';

  // CZAT
  const chatBox = document.getElementById('chatBox');
  function openChat(){ chatBox.classList.add('open'); }
  document.getElementById('chatBtn').onclick = ()=>{
    if(!user){ window.pendingChat=true; showLogin(); return }
    chatBox.classList.toggle('open');
  };
  const messages = document.getElementById('messages');
  onChildAdded(ref(db,'chat'), snap=>{
    const m=snap.val();
    const div=document.createElement('div'); div.className='msg';
    div.innerHTML = `<b style="color:${m.color}">${m.nick}:</b> ${m.text}`;
    messages.appendChild(div); messages.scrollTop=messages.scrollHeight;
  });
  document.getElementById('chat-form').onsubmit = e=>{
    e.preventDefault(); if(!user) return;
    const txt = document.getElementById('msgInput').value.trim(); if(!txt) return;
    push(ref(db,'chat'), {nick:user.nick, color:user.color, text:txt, ts:Date.now()});
    e.target.reset();
  };
</script>
</body>
</html>
