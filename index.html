<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skaczące tabele</title>
  <style>
    body{
      font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
      background:#f4f4f9;
      margin:0;
      padding:20px;
      color:#222;
    }
    .wrapper{
      max-width:1200px;
      margin:0 auto;
      background:#fff;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }
    h1{
      text-align:center;
      margin-top:0;
      font-size:24px;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      align-items:center;
      justify-content:center;
      margin-bottom:20px;
      padding:15px;
      background:#f0f4ff;
      border-radius:8px;
    }
    label{
      font-weight:600;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    input[type="number"]{
      width:90px;
      padding:8px 10px;
      font-size:15px;
      border:2px solid #aaa;
      border-radius:6px;
      text-align:center;
    }
    button{
      padding:10px 22px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      border:none;
      border-radius:6px;
      transition:all 0.2s;
      margin:5px;
    }
    .btn-generate{ background:#2e7d32; color:#fff; }
    .btn-generate:hover{ background:#1b5e20; }
    .btn-fullscreen{ background:#1565c0; color:#fff; }
    .btn-fullscreen:hover{ background:#0d47a1; }

    #tableContainer{
      display:none;
      margin-top:20px;
      text-align:center;
    }
    #sumDisplay{
      font-size:22px;
      font-weight:bold;
      margin-bottom:15px;
      color:#b71c1c;
      background:#ffebee;
      padding:10px;
      border-radius:8px;
      display:inline-block;
    }

    table{
      border-collapse:collapse;
      margin:0 auto;
      background:#fff;
    }
    td{
      padding:14px;
      border:3px solid #000; /* grubość nadpisuje JS */
      font-size:56px;
      text-align:center;
      font-weight:bold;
      font-family:"Arial Black", Arial, sans-serif;
      min-width:70px;
      vertical-align:middle;
    }

    /* Dropdown wygląda “twardo” na ploter */
    select.valueSelect{
      width:100%;
      height:64px;
      font-size:36px;
      font-weight:800;
      text-align:center;
      border:0;
      outline:none;
      background:#fff;
      cursor:pointer;
      font-family:"Arial Black", Arial, sans-serif;
      -webkit-appearance: none;
      appearance: none;
      padding:0 6px;
    }

    #tableContainer:fullscreen{
      background:white;
      padding:20px;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:auto;
    }
    #tableContainer:fullscreen table{
      max-width:95%;
      max-height:95%;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>📊 Tabela – Suma na żywo + ręczna zmiana komórek (tylko: 5,10,20,50,100)</h1>

    <div class="controls">
      <label>
        Wiersze:
        <input type="number" id="rows" min="1" max="50" value="4">
      </label>
      <label>
        Kolumny:
        <input type="number" id="cols" min="1" max="50" value="5">
      </label>
      <label>
        Grubość ścianek (px):
        <input type="number" id="borderThickness" min="1" max="20" value="4">
      </label>

      <button class="btn-generate" onclick="generateTable()">Generuj tabelę</button>
    </div>

    <div id="tableContainer">
      <div id="sumDisplay">Suma wszystkich liczb w tabeli: —</div>
      <table id="dataTable"></table>
      <button class="btn-fullscreen" onclick="goFullscreen()">🖥️ Wyświetl na pełny ekran (zrób screena)</button>
    </div>
  </div>

  <script>
    const ALLOWED = [5, 10, 20, 50, 100];

    let allSelects = []; // do szybkiego liczenia sumy

    function randomAllowed() {
      return ALLOWED[Math.floor(Math.random() * ALLOWED.length)];
    }

    function updateSumLive() {
      // Suma dokładnie z wartości w selectach (bez zaokrągleń)
      let sum = 0;
      for (const s of allSelects) sum += parseInt(s.value, 10);
      document.getElementById('sumDisplay').textContent = `Suma wszystkich liczb w tabeli: ${sum}`;
    }

    function generateTable() {
      let rows = parseInt(document.getElementById('rows').value, 10);
      let cols = parseInt(document.getElementById('cols').value, 10);
      let border = parseInt(document.getElementById('borderThickness').value, 10);

      if (isNaN(rows) || isNaN(cols) || isNaN(border) || rows < 1 || cols < 1 || border < 1) {
        alert("Wprowadź poprawne, dodatnie liczby całkowite!");
        return;
      }

      const table = document.getElementById('dataTable');
      const container = document.getElementById('tableContainer');

      table.innerHTML = '';
      allSelects = [];

      for (let r = 0; r < rows; r++) {
        const tr = document.createElement('tr');

        for (let c = 0; c < cols; c++) {
          const td = document.createElement('td');

          // ustaw grubość ścianek dokładnie
          td.style.borderWidth = border + "px";
          td.style.borderStyle = "solid";
          td.style.borderColor = "black";

          // select z dozwolonymi wartościami (ręczna zmiana)
          const sel = document.createElement('select');
          sel.className = 'valueSelect';

          for (const v of ALLOWED) {
            const opt = document.createElement('option');
            opt.value = v;
            opt.textContent = v;
            sel.appendChild(opt);
          }

          sel.value = randomAllowed();

          // aktualizacja sumy na żywo
          sel.addEventListener('change', updateSumLive);

          td.appendChild(sel);
          tr.appendChild(td);

          allSelects.push(sel);
        }
        table.appendChild(tr);
      }

      container.style.display = 'block';
      updateSumLive();
    }

    function goFullscreen() {
      const elem = document.getElementById('tableContainer');

      if (!document.fullscreenElement) {
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
