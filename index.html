<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIELKI EVENT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            padding: 20px;
        }

        /* Animowany napis ognia */
        .fire-title {
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            margin: 40px 0;
            letter-spacing: 8px;
            position: relative;
            text-shadow: 
                0 0 10px #ff0000,
                0 0 20px #ff6600,
                0 0 30px #ffaa00,
                0 0 40px #ff0000;
            animation: fireFlicker 0.15s infinite;
            background: linear-gradient(45deg, #ff0000, #ffaa00, #ff6600, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes fireFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 10px #ff0000,
                    0 0 20px #ff6600,
                    0 0 30px #ffaa00,
                    0 0 40px #ff0000,
                    0 0 50px #ff0000;
            }
            20%, 24%, 55% {
                text-shadow: 
                    0 0 5px #ff0000,
                    0 0 10px #ff6600,
                    0 0 15px #ffaa00;
            }
        }

        /* Licznik czasu */
        .countdown-container {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00aa00;
            border-radius: 10px;
            padding: 30px;
            margin: 30px auto;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 170, 0, 0.3);
        }

        .countdown-container h2 {
            margin-bottom: 20px;
            color: #00ff00;
        }

        .countdown {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(0, 170, 0, 0.1);
            border: 1px solid #00aa00;
            padding: 15px 20px;
            border-radius: 5px;
            min-width: 80px;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff00;
            font-family: 'Courier New', monospace;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: #00aa00;
            margin-top: 5px;
        }

        /* Info o evencie */
        .event-info {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 25px;
            margin: 30px auto;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
        }

        .event-info h3 {
            color: #ffaa00;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .event-info p {
            margin: 10px 0;
            color: #ddd;
            line-height: 1.6;
        }

        .event-info a {
            color: #00ff00;
            text-decoration: none;
            border-bottom: 1px solid #00ff00;
            transition: all 0.3s;
        }

        .event-info a:hover {
            color: #00aa00;
            text-shadow: 0 0 10px #00ff00;
        }

        /* Przyciska */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin: 30px auto;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1rem;
            border: 2px solid #00ff00;
            background: rgba(0, 170, 0, 0.1);
            color: #00ff00;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: rgba(0, 170, 0, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Modal banera */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #1a1a1a;
            margin: auto;
            padding: 0;
            border: 2px solid #00ff00;
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .close {
            position: absolute;
            right: 15px;
            top: 15px;
            color: #00ff00;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s;
        }

        .close:hover {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        .modal img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 5px;
            object-fit: contain;
            padding: 20px;
        }

        .btn-download {
            margin-top: 20px;
            margin-bottom: 20px;
            border-color: #ffaa00;
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
        }

        .btn-download:hover {
            background: rgba(255, 170, 0, 0.3);
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
        }

        /* Chat Modal */
        .chat-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .chat-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 2px solid #00ff00;
        }

        .chat-close {
            position: absolute;
            right: 15px;
            top: 15px;
            color: #00ff00;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 2001;
            transition: all 0.3s;
        }

        .chat-close:hover {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        /* Login form */
        .login-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #00aa00;
            max-height: 100%;
            overflow-y: auto;
        }

        .login-section h2 {
            color: #00ff00;
            margin-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #00aa00;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            background: rgba(0, 170, 0, 0.1);
            border: 1px solid #00aa00;
            color: #00ff00;
            border-radius: 5px;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: #008800;
        }

        .gender-options,
        .custom-gender-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .gender-btn,
        .custom-gender-btn {
            padding: 10px 15px;
            border: 1px solid #00aa00;
            background: rgba(0, 170, 0, 0.1);
            color: #00ff00;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .gender-btn:hover,
        .custom-gender-btn:hover {
            background: rgba(0, 170, 0, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .gender-btn.active,
        .custom-gender-btn.active {
            background: rgba(0, 170, 0, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            border-color: #00ff00;
        }

        .btn-login {
            padding: 12px;
            background: rgba(0, 170, 0, 0.2);
            border: 1px solid #00aa00;
            color: #00ff00;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: rgba(0, 170, 0, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .btn-random-color {
            padding: 10px;
            background: rgba(255, 170, 0, 0.2);
            border: 1px solid #ffaa00;
            color: #ffaa00;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-random-color:hover {
            background: rgba(255, 170, 0, 0.4);
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 1px solid #00aa00;
            margin-top: 5px;
        }

        /* Chat messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 15px;
            background: rgba(0, 170, 0, 0.05);
            border-left: 3px solid;
            border-radius: 5px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-nick {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-content {
            color: #ddd;
            word-wrap: break-word;
        }

        /* Chat input */
        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 2px solid #00aa00;
        }

        .chat-input-container input {
            flex: 1;
            padding: 10px;
            background: rgba(0, 170, 0, 0.1);
            border: 1px solid #00aa00;
            color: #00ff00;
            border-radius: 5px;
            font-family: inherit;
        }

        .chat-input-container input::placeholder {
            color: #008800;
        }

        .chat-input-container button {
            padding: 10px 20px;
            background: rgba(0, 170, 0, 0.2);
            border: 1px solid #00aa00;
            color: #00ff00;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .chat-input-container button:hover {
            background: rgba(0, 170, 0, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .hidden {
            display: none;
        }

        .user-info {
            background: rgba(0, 170, 0, 0.1);
            padding: 15px;
            border-bottom: 1px solid #00aa00;
            color: #00ff00;
        }

        .custom-gender-section {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }

        .custom-gender-section h4 {
            color: #ffaa00;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .fire-title {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }

            .button-container {
                padding: 0 10px;
            }

            .modal-content {
                max-width: 95%;
            }

            .chat-modal {
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Główna zawartość -->
    <div id="mainContent">
        <h1 class="fire-title">WIELKI EVENT</h1>

        <!-- Licznik czasu -->
        <div class="countdown-container">
            <h2>Czas do eventu</h2>
            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-number" id="days">0</div>
                    <div class="countdown-label">Dni</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="hours">0</div>
                    <div class="countdown-label">Godziny</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="minutes">0</div>
                    <div class="countdown-label">Minuty</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="seconds">0</div>
                    <div class="countdown-label">Sekundy</div>
                </div>
            </div>
        </div>

        <!-- Informacje o evencie -->
        <div class="event-info">
            <h3>Informacje o evencie</h3>
            <p><strong>Godzina:</strong> 10:00</p>
            <p><strong>Data:</strong> 3 sierpnia 2026</p>
            <p><strong>Miejsce:</strong> Nowy Sącz, Osiedle Barskie</p>
            <p><strong>Lokalizacja:</strong> <a href="https://maps.app.goo.gl/4KyoKhGWkUrDLYUH8" target="_blank">Otwórz na Google Maps</a></p>
        </div>

        <!-- Przyciski -->
        <div class="button-container">
            <button class="btn" onclick="openBannerModal()">Pokaż baner eventu</button>
            <button class="btn" onclick="openChatModal()">Przejdź do czatu grupowego</button>
        </div>
    </div>

    <!-- Modal banera -->
    <div id="bannerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBannerModal()">&times;</span>
            <img src="foty/baner_event.jpg" alt="Baner eventu">
            <button class="btn btn-download" onclick="downloadBanner()">Pobierz baner do galerii</button>
        </div>
    </div>

    <!-- Chat Modal -->
    <div id="chatModal" class="chat-modal">
        <div class="chat-container">
            <span class="chat-close" onclick="closeChatModal()">&times;</span>
            
            <!-- Login section -->
            <div id="loginSection" class="login-section">
                <h2>Dołącz do czatu</h2>
                
                <div class="form-group">
                    <label for="nickInput">Pseudonim:</label>
                    <input type="text" id="nickInput" placeholder="Wpisz swój nick...">
                </div>

                <div class="form-group">
                    <label>Płeć:</label>
                    <div class="gender-options">
                        <button class="gender-btn" onclick="selectGender('Mężczyzna')">Mężczyzna</button>
                        <button class="gender-btn" onclick="selectGender('Kobieta')">Kobieta</button>
                        <button class="gender-btn" onclick="selectGender('Inne')">Inne</button>
                    </div>
                </div>

                <div id="customGenderSection" class="custom-gender-section hidden">
                    <h4>Wybierz coś bardziej pasującego:</h4>
                    <div class="custom-gender-options">
                        <button class="custom-gender-btn" onclick="selectCustomGender('🚁 Helikopter bojowy')">🚁 Helikopter bojowy</button>
                        <button class="custom-gender-btn" onclick="selectCustomGender('🚗 Cadillac Eldorado')">🚗 Cadillac Eldorado</button>
                        <button class="custom-gender-btn" onclick="selectCustomGender('👤 Nico Belic')">👤 Nico Belic</button>
                        <button class="custom-gender-btn" onclick="selectCustomGender('🎮 Konsola PlayStation 6')">🎮 Konsola PlayStation 6</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="colorPicker">Kolor nicku:</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <div id="colorPreview" class="color-preview" style="background-color: #00ff00;"></div>
                        <button class="btn-random-color" onclick="randomizeNickColor()">Losuj kolor nicku</button>
                    </div>
                </div>

                <button class="btn-login" onclick="joinChat()">Dołącz do czatu</button>
            </div>

            <!-- Chat section (hidden until logged in) -->
            <div id="chatSection" class="hidden" style="flex: 1; display: flex; flex-direction: column;">
                <div class="user-info">
                    Zalogowany jako: <span id="userNickDisplay" style="color: #00ff00;"></span>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container">
                    <input type="text" id="messageInput" placeholder="Wpisz wiadomość..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">Wyślij</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== ZMIENNE GLOBALNE =====
        let usedColors = [];
        let currentUserNick = '';
        let currentUserColor = '#00ff00';
        let currentGender = '';
        let isLoggedIn = false;

        // ===== INICJALIZACJA =====
        document.addEventListener('DOMContentLoaded', function() {
            updateCountdown();
            setInterval(updateCountdown, 1000);
            initSupabase();
        });

        // ===== LICZNIK CZASU =====
        function updateCountdown() {
            const eventDate = new Date('2026-08-03T10:00:00').getTime();
            const now = new Date().getTime();
            const distance = eventDate - now;

            if (distance < 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // ===== MODAL BANERA =====
        function openBannerModal() {
            document.getElementById('bannerModal').style.display = 'block';
        }

        function closeBannerModal() {
            document.getElementById('bannerModal').style.display = 'none';
        }

        function downloadBanner() {
            const link = document.createElement('a');
            link.href = 'foty/baner_event.jpg';
            link.download = 'baner_event.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('bannerModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // ===== CHAT MODAL =====
        function openChatModal() {
            document.getElementById('chatModal').style.display = 'block';
            if (isLoggedIn) {
                loadMessages();
            }
        }

        function closeChatModal() {
            document.getElementById('chatModal').style.display = 'none';
        }

        function selectGender(gender) {
            currentGender = gender;
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            const customSection = document.getElementById('customGenderSection');
            if (gender === 'Inne') {
                customSection.classList.remove('hidden');
            } else {
                customSection.classList.add('hidden');
            }
        }

        function selectCustomGender(customGender) {
            currentGender = customGender;
            document.querySelectorAll('.custom-gender-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function randomizeNickColor() {
            let newColor = generateRandomColor();
            
            // Upewnij się, że kolor nie został już użyty
            while (usedColors.includes(newColor)) {
                newColor = generateRandomColor();
            }

            currentUserColor = newColor;
            document.getElementById('colorPreview').style.backgroundColor = newColor;
        }

        function generateRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function joinChat() {
            const nick = document.getElementById('nickInput').value.trim();

            if (!nick) {
                alert('Wpisz nick!');
                return;
            }

            if (!currentGender) {
                alert('Wybierz płeć!');
                return;
            }

            currentUserNick = nick;
            isLoggedIn = true;

            // Ukryj login section, pokaż chat
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('chatSection').classList.remove('hidden');
            document.getElementById('userNickDisplay').textContent = nick;
            document.getElementById('userNickDisplay').style.color = currentUserColor;

            // Zaznacz kolor jako użyty
            usedColors.push(currentUserColor);

            // Załaduj wiadomości
            loadMessages();

            // Nasłuchuj zmian w czacie
            subscribeToMessages();
        }

        // ===== SUPABASE =====
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';

        let supabaseClient;

        async function initSupabase() {
            // Importuj bibliotekę Supabase
            const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
            supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        async function loadMessages() {
            if (!supabaseClient) return;

            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '';

                data.forEach(message => {
                    addMessageToChat(message.nick, message.color, message.content);
                });

                // Scroll na koniec
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (error) {
                console.error('Błąd przy ładowaniu wiadomości:', error);
            }
        }

        function subscribeToMessages() {
            if (!supabaseClient) return;

            supabaseClient
                .channel('messages')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'messages' },
                    (payload) => {
                        const message = payload.new;
                        addMessageToChat(message.nick, message.color, message.content);
                        document.getElementById('chatMessages').scrollTop = 
                            document.getElementById('chatMessages').scrollHeight;
                    }
                )
                .subscribe();
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();

            if (!content) return;

            if (!supabaseClient) return;

            try {
                const { error } = await supabaseClient
                    .from('messages')
                    .insert([
                        {
                            nick: currentUserNick,
                            color: currentUserColor,
                            content: content
                        }
                    ]);

                if (error) throw error;

                messageInput.value = '';
            } catch (error) {
                console.error('Błąd przy wysyłaniu wiadomości:', error);
                alert('Błąd przy wysyłaniu wiadomości!');
            }
        }

        function addMessageToChat(nick, color, content) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            messageDiv.style.borderLeftColor = color;

            const nickSpan = document.createElement('div');
            nickSpan.className = 'message-nick';
            nickSpan.style.color = color;
            nickSpan.textContent = nick;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(nickSpan);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
