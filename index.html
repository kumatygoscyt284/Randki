<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WIELKI EVENT 2026</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- EKRAN TWORZENIA PROFILU -->
  <div id="loginScreen" class="screen">
    <div class="login-container">
      <h1>Witaj na WIELKIM EVENCIE!</h1>
      <p>Stwórz swój profil (przypisany do urządzenia)</p>

      <input type="text" id="nickname" placeholder="Twój pseudonim" maxlength="20" />

      <div class="color-picker">
        <label>Wybierz kolor nicku:</label>
        <input type="color" id="colorPicker" value="#ff0000" />
        <div id="colorPreview" class="color-preview"></div>
      </div>

      <button id="createProfileBtn">Utwórz profil i wejdź</button>
      <p id="errorMsg" class="error"></p>
    </div>
  </div>

  <!-- GŁÓWNA STRONA -->
  <div id="mainScreen" class="screen hidden">
    <header>
      <canvas id="fireCanvas"></canvas>
      <h1 id="mainTitle">WIELKI EVENT</h1>
    </header>

    <div class="countdown">
      <h2>Do eventu pozostało:</h2>
      <div id="timer" class="timer"></div>
    </div>

    <div class="event-info">
      <h3>📍 Miejsce wydarzenia</h3>
      <p><strong>Osiedle Barskie, Nowy Sącz</strong></p>
      <a href="https://maps.app.goo.gl/S7bJ817h2Nqgwkra8" target="_blank" class="map-link">
        Otwórz w Google Maps →
      </a>
    </div>

    <div class="buttons">
      <button id="showBannerBtn" class="btn blue">🖼 Baner eventu</button>
      <button id="openChatBtn" class="btn green">💬 Czat grupowy</button>
    </div>

    <!-- Baner Modal -->
    <div id="bannerModal" class="modal hidden">
      <div class="modal-content">
        <span class="close">&times;</span>
        <img src="foty/baner_event.jpg" alt="Baner Eventu" class="banner-img"/>
        <button id="downloadBannerBtn">Pobierz baner do galerii</button>
      </div>
    </div>

    <!-- Czat Modal -->
    <div id="chatModal" class="modal hidden">
      <div class="chat-container">
        <div class="chat-header">
          <h3>Czat grupowy — 1000 osób</h3>
          <span class="close-chat">&times;</span>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="Napisz wiadomość..." />
          <button id="sendMessageBtn">Wyślij</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
