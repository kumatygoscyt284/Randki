<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIELKI EVENT · czat i uczestnicy</title>
  <!-- Firebase SDK (modular) -->
  <script type="module">
    // === KOMENTARZ: Konfiguracja Firebase – użyj własnych danych z konsoli Firebase ===
    // Wystarczy statyczny frontend, dane trzymane w Firestore.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy, limit, getDocs, serverTimestamp, where, getDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7kEyVJqGkGXOSFkQkLpYKZpYKZpYKpY",  // przykładowy klucz – zastąp własnym
      authDomain: "twoj-projekt-xyz.firebaseapp.com",
      projectId: "twoj-projekt-xyz",
      storageBucket: "twoj-projekt-xyz.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:abc123def456"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Udostępnij db globalnie dla skryptów inline
    window.db = db;
    window.collection = collection;
    window.doc = doc;
    window.setDoc = setDoc;
    window.addDoc = addDoc;
    window.onSnapshot = onSnapshot;
    window.query = query;
    window.orderBy = orderBy;
    window.limit = limit;
    window.getDocs = getDocs;
    window.where = where;
    window.getDoc = getDoc;
    window.serverTimestamp = serverTimestamp;
    window.Timestamp = Timestamp;
    window.Firestore = { collection, doc, setDoc, addDoc, onSnapshot, query, orderBy, limit, getDocs, where, getDoc, serverTimestamp, Timestamp };
    console.log('🔥 Firebase gotowy');
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0b0e14;
      color: #eef2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    #app {
      max-width: 1100px;
      width: 100%;
    }
    /* === OGNIOWA ANIMACJA === */
    @keyframes fireGlow {
      0% { text-shadow: 0 0 4px #ff4d00, 0 0 10px #ff9d00, 0 0 20px #ffcc00; color: #ffbb33; }
      25% { text-shadow: 0 0 8px #ff2200, 0 0 18px #ff6600, 0 0 30px #ffaa00; color: #ff8c00; }
      50% { text-shadow: 0 0 12px #ff0000, 0 0 25px #ff3300, 0 0 40px #ff6600; color: #ff5500; }
      75% { text-shadow: 0 0 8px #ff4400, 0 0 20px #ff8800, 0 0 30px #ffbb33; color: #ffaa33; }
      100% { text-shadow: 0 0 4px #ff4d00, 0 0 10px #ff9d00, 0 0 20px #ffcc00; color: #ffbb33; }
    }
    .fire-title {
      font-size: 4rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.1em;
      animation: fireGlow 1.8s infinite alternate ease-in-out;
      margin: 0.2em 0 0.1em;
      line-height: 1.2;
    }
    .countdown-box {
      background: #1e2530;
      padding: 1.2rem 2rem;
      border-radius: 60px;
      display: inline-block;
      margin: 0.5rem auto 1.5rem;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 3px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #ff8c42;
    }
    .event-info {
      background: #191f2a;
      padding: 1.2rem 2rem;
      border-radius: 30px;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .event-info a {
      color: #ffb347;
      font-weight: 600;
    }
    .btn {
      background: #2e3b4e;
      border: none;
      color: white;
      padding: 0.6rem 1.6rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #4a5a72;
      margin: 0.2rem;
    }
    .btn-primary {
      background: #ff7b2b;
      border-color: #ff9f4b;
      color: #0b0e14;
    }
    .btn-primary:hover { background: #ff9640; transform: scale(1.02); }
    .btn-outline {
      background: transparent;
      border: 1px solid #6f8aad;
      color: #d4e0f0;
    }
    .btn-outline:hover { background: #2b384b; }
    .card {
      background: #151c26;
      border-radius: 30px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
    }
    .flex-row { display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: center; }
    .participant-list {
      max-height: 130px;
      overflow-y: auto;
      background: #10161f;
      padding: 0.6rem 1rem;
      border-radius: 30px;
      margin-top: 0.5rem;
    }
    .participant-list.expanded { max-height: 400px; }
    .participant-item {
      display: inline-block;
      background: #252f3f;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      margin: 0.25rem 0.25rem;
      font-weight: 600;
    }
    /* czat */
    #chatMessages {
      height: 300px;
      overflow-y: auto;
      background: #0d121c;
      border-radius: 24px;
      padding: 1rem;
      margin: 0.8rem 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border: 1px solid #2f3d52;
    }
    .msg {
      background: #1f2a38;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      max-width: 80%;
      word-break: break-word;
    }
    .msg .nick { font-weight: 700; margin-right: 0.4rem; }
    .msg .time { font-size: 0.7rem; color: #8a9bb0; margin-left: 0.6rem; }
    .chat-input-area {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    #chatInput {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border-radius: 40px;
      border: none;
      background: #1d2633;
      color: white;
      font-size: 1rem;
      min-width: 150px;
    }
    #chatInput::placeholder { color: #6e7f96; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-card {
      background: #1f293b;
      padding: 2rem 2.5rem;
      border-radius: 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px black;
    }
    .modal-card h2 { margin-bottom: 1.2rem; }
    .modal-card input, .modal-card input[type="color"] {
      width: 100%;
      padding: 0.5rem;
      margin: 0.6rem 0;
      border-radius: 30px;
      border: none;
      background: #2d384b;
      color: white;
    }
    .color-picker-row { display: flex; gap: 10px; align-items: center; }
    .color-picker-row input[type="color"] { width: 60px; height: 50px; padding: 2px; }
    .error-message { color: #ff7a5c; font-size: 0.9rem; margin-top: 0.3rem; }
    .info-small { color: #a0b6d0; font-size: 0.9rem; }
    .hidden { display: none; }
    hr { border-color: #2f4057; margin: 1rem 0; }
    .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; flex-wrap: wrap; }
    #userBadge { background: #1f2a3a; padding: 0.3rem 1.5rem; border-radius: 40px; }
  </style>
</head>
<body>
<div id="app">
  <!-- panel logowania / info o profilu -->
  <div class="top-bar">
    <div id="userBadge" class="hidden">👤 <span id="displayNick"></span></div>
    <button id="loginBtn" class="btn btn-outline">🔑 zaloguj / profil</button>
  </div>

  <!-- TYTUŁ z ogniem -->
  <div class="fire-title">WIELKI EVENT</div>

  <!-- ODliczanie -->
  <div style="text-align: center;">
    <div class="countdown-box" id="countdownTimer">--</div>
  </div>

  <!-- Info o evencie -->
  <div class="event-info">
    <span><strong>📍 <a href="https://maps.app.goo.gl/S7bJ817h2Nqgwkra8" target="_blank">osiedle Barskie, Nowy Sącz</a></strong></span>
    <span>🗓️ 3 sierpnia 2026, 10:00 CET</span>
  </div>

  <!-- Lista uczestników + wezmę udział -->
  <div class="card">
    <div class="flex-row" style="justify-content: space-between;">
      <h3>👥 Uczestnicy <span id="participantCount">0</span></h3>
      <div>
        <button id="toggleParticipantsBtn" class="btn btn-outline">rozwiń listę</button>
        <button id="joinEventBtn" class="btn btn-primary">✅ wezmę udział</button>
      </div>
    </div>
    <div id="participantListContainer" class="participant-list">
      <!-- dynamicznie -->
    </div>
  </div>

  <!-- Czat grupowy -->
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3>💬 czat grupowy</h3>
      <button id="openChatBtn" class="btn btn-primary">✍️ czat grupowy</button>
    </div>
    <!-- widok czatu (domyślnie ukryty) -->
    <div id="chatArea" class="hidden" style="margin-top: 1rem;">
      <div id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="napisz wiadomość..." />
        <button id="sendMsgBtn" class="btn btn-primary">wyślij</button>
      </div>
      <p class="info-small" style="margin-top: 0.4rem;">⚡ wiadomości na żywo</p>
    </div>
  </div>
</div>

<!-- Modal logowania / profil (wbudowany) -->
<div id="loginModal" class="modal-overlay hidden">
  <div class="modal-card">
    <h2>👋 Twój profil uczestnika</h2>
    <label>Pseudonim (nick)</label>
    <input type="text" id="nickInput" placeholder="np. SuperGość" value="" />
    <div class="color-picker-row">
      <label>Kolor nicku:</label>
      <input type="color" id="colorInput" value="#ffaa33" />
    </div>
    <div id="colorStatus" class="error-message"></div>
    <div style="margin-top: 1.5rem; display: flex; gap: 12px; flex-wrap: wrap;">
      <button id="saveProfileBtn" class="btn btn-primary">✓ zapisz profil</button>
      <button id="closeModalBtn" class="btn btn-outline">anuluj</button>
    </div>
    <p class="info-small" style="margin-top: 0.8rem;">Kolor musi być unikalny. Zaproponujemy podobny.</p>
  </div>
</div>

<script type="module">
  // === Główna logika aplikacji (moduł) ===
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy, limit, getDocs, where, getDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Konfiguracja (taka sama jak wyżej – w produkcie wstaw swoją)
  const firebaseConfig = {
    apiKey: "AIzaSyB7kEyVJqGkGXOSFkQkLpYKZpYKZpYKpY",
    authDomain: "twoj-projekt-xyz.firebaseapp.com",
    projectId: "twoj-projekt-xyz",
    storageBucket: "twoj-projekt-xyz.appspot.com",
    messagingSenderId: "123456789012",
    appId: "1:123456789012:web:abc123def456"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // === Elementy DOM ===
  const loginBtn = document.getElementById('loginBtn');
  const loginModal = document.getElementById('loginModal');
  const closeModalBtn = document.getElementById('closeModalBtn');
  const nickInput = document.getElementById('nickInput');
  const colorInput = document.getElementById('colorInput');
  const colorStatus = document.getElementById('colorStatus');
  const saveProfileBtn = document.getElementById('saveProfileBtn');
  const displayNick = document.getElementById('displayNick');
  const userBadge = document.getElementById('userBadge');

  const participantListContainer = document.getElementById('participantListContainer');
  const participantCountSpan = document.getElementById('participantCount');
  const toggleParticipantsBtn = document.getElementById('toggleParticipantsBtn');
  const joinEventBtn = document.getElementById('joinEventBtn');

  const openChatBtn = document.getElementById('openChatBtn');
  const chatArea = document.getElementById('chatArea');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendMsgBtn = document.getElementById('sendMsgBtn');

  // === Stan aplikacji ===
  let currentUser = null; // { nick, color, deviceId }
  let participantsMap = new Map(); // id -> { nick, color }
  let allParticipants = [];

  // === ID urządzenia (localStorage) ===
  function getDeviceId() {
    let deviceId = localStorage.getItem('event_deviceId');
    if (!deviceId) {
      deviceId = 'device_' + Math.random().toString(36).substr(2, 12) + Date.now();
      localStorage.setItem('event_deviceId', deviceId);
    }
    return deviceId;
  }
  const DEVICE_ID = getDeviceId();

  // === Sprawdź czy profil istnieje w Firebase po deviceId ===
  async function loadProfile() {
    try {
      const q = query(collection(db, 'profiles'), where('deviceId', '==', DEVICE_ID));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const data = snap.docs[0].data();
        currentUser = { nick: data.nick, color: data.color, deviceId: DEVICE_ID, docId: snap.docs[0].id };
        // Aktualizuj UI
        displayNick.textContent = currentUser.nick;
        displayNick.style.color = currentUser.color;
        userBadge.classList.remove('hidden');
        loginBtn.textContent = '🔁 zmień profil';
        return true;
      }
    } catch (e) { console.warn('Błąd wczytywania profilu', e); }
    return false;
  }

  // === Sprawdzanie unikalności koloru (proponowanie podobnego) ===
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return {r,g,b};
  }
  function rgbToHex(r,g,b) {
    return '#'+[r,g,b].map(c => Math.min(255,Math.max(0,c)).toString(16).padStart(2,'0')).join('');
  }
  function colorDistance(hex1, hex2) {
    const c1 = hexToRgb(hex1), c2 = hexToRgb(hex2);
    return Math.sqrt((c1.r-c2.r)**2 + (c1.g-c2.g)**2 + (c1.b-c2.b)**2);
  }

  // Lista zajętych kolorów (z firestore)
  async function getUsedColors(excludeDeviceId = null) {
    const snap = await getDocs(collection(db, 'profiles'));
    const colors = [];
    snap.forEach(d => {
      const data = d.data();
      if (excludeDeviceId && data.deviceId === excludeDeviceId) return;
      if (data.color) colors.push(data.color);
    });
    return colors;
  }

  function proposeSimilarColor(desiredColor, usedColors) {
    if (!usedColors.includes(desiredColor)) return desiredColor;
    // mała zmiana – iterujemy
    let best = desiredColor;
    let bestDist = Infinity;
    // przeszukaj pobliskie odcienie
    const base = hexToRgb(desiredColor);
    for (let dr = -30; dr <= 30; dr+=8) {
      for (let dg = -30; dg <= 30; dg+=8) {
        for (let db = -30; db <= 30; db+=8) {
          const nr = base.r + dr;
          const ng = base.g + dg;
          const nb = base.b + db;
          const candidate = rgbToHex(nr, ng, nb);
          if (usedColors.includes(candidate)) continue;
          const dist = colorDistance(desiredColor, candidate);
          if (dist < bestDist) {
            bestDist = dist;
            best = candidate;
          }
        }
      }
    }
    return best;
  }

  // === Zapisz / utwórz profil ===
  async function saveProfile() {
    const nick = nickInput.value.trim();
    let color = colorInput.value;
    if (!nick) { colorStatus.textContent = 'Podaj pseudonim.'; return; }
    // walidacja unikalności koloru
    const usedColors = await getUsedColors(DEVICE_ID);
    if (usedColors.includes(color)) {
      const proposed = proposeSimilarColor(color, usedColors);
      if (proposed !== color) {
        color = proposed;
        colorInput.value = proposed;
        colorStatus.textContent = `Kolor zajęty, zaproponowano podobny: ${proposed}`;
      } else {
        colorStatus.textContent = 'Nie udało się dobrać unikalnego koloru. Wybierz inny.';
        return;
      }
    }
    // usuń stary profil jeśli istnieje
    try {
      const q = query(collection(db, 'profiles'), where('deviceId', '==', DEVICE_ID));
      const snap = await getDocs(q);
      for (const docSnap of snap.docs) {
        await doc(db, 'profiles', docSnap.id).delete();
      }
    } catch (e) { console.warn(e); }

    // zapisz nowy
    try {
      const docRef = await addDoc(collection(db, 'profiles'), {
        nick, color, deviceId: DEVICE_ID, createdAt: serverTimestamp()
      });
      currentUser = { nick, color, deviceId: DEVICE_ID, docId: docRef.id };
      displayNick.textContent = nick;
      displayNick.style.color = color;
      userBadge.classList.remove('hidden');
      loginBtn.textContent = '🔁 zmień profil';
      loginModal.classList.add('hidden');
      colorStatus.textContent = '';
      // odśwież listę uczestników
      loadParticipants();
    } catch (e) {
      colorStatus.textContent = 'Błąd zapisu: ' + e.message;
    }
  }

  // === Uczestnicy ===
  async function loadParticipants() {
    const snap = await getDocs(collection(db, 'profiles'));
    participantsMap.clear();
    snap.forEach(d => {
      const data = d.data();
      participantsMap.set(d.id, { nick: data.nick, color: data.color, deviceId: data.deviceId });
    });
    allParticipants = Array.from(participantsMap.values());
    renderParticipants();
  }

  function renderParticipants() {
    const list = allParticipants;
    participantCountSpan.textContent = list.length;
    // pokazuj tylko ostatnich 3, jeśli nie rozwinięte
    let displayList = list;
    if (!participantListContainer.classList.contains('expanded')) {
      displayList = list.slice(-3);
    }
    participantListContainer.innerHTML = displayList.map(p => 
      `<span class="participant-item" style="color: ${p.color};">${p.nick}</span>`
    ).join('');
  }

  // === Dodaj siebie do uczestników (wezmę udział) ===
  async function joinEvent() {
    if (!currentUser) {
      alert('Najpierw utwórz profil (kliknij "zaloguj").');
      return;
    }
    // Profil już istnieje, ale dodajemy do listy uczestników (właściwie profile są uczestnikami)
    // Odśwież listę i ewentualnie dodaj znacznik – profil istnieje.
    await loadParticipants();
    // zwizualizuj
    participantListContainer.classList.add('expanded');
    toggleParticipantsBtn.textContent = 'zwiń listę';
    renderParticipants();
  }

  // === Czat ===
  let chatUnsub = null;
  function openChat() {
    if (!currentUser) {
      alert('Musisz mieć profil, aby pisać na czacie. Załóż go przez "zaloguj".');
      return;
    }
    chatArea.classList.remove('hidden');
    // nasłuchuj wiadomości
    if (chatUnsub) chatUnsub();
    const q = query(collection(db, 'messages'), orderBy('timestamp', 'desc'), limit(50));
    chatUnsub = onSnapshot(q, (snap) => {
      const msgs = [];
      snap.forEach(d => msgs.push(d.data()));
      msgs.reverse(); // od najstarszych
      chatMessages.innerHTML = msgs.map(m => {
        const nick = m.nick || 'anon';
        const color = m.color || '#aaa';
        const time = m.timestamp?.toDate().toLocaleTimeString() || '';
        return `<div class="msg"><span class="nick" style="color:${color}">${nick}</span>${m.text}<span class="time">${time}</span></div>`;
      }).join('');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  async function sendMessage() {
    if (!currentUser) { alert('Profil wymagany.'); return; }
    const text = chatInput.value.trim();
    if (!text) return;
    try {
      await addDoc(collection(db, 'messages'), {
        nick: currentUser.nick,
        color: currentUser.color,
        text: text,
        timestamp: serverTimestamp()
      });
      chatInput.value = '';
    } catch (e) { console.error(e); }
  }

  // === ODliczanie do 2026-08-03 10:00 CET ===
  function updateCountdown() {
    const target = new Date('2026-08-03T10:00:00+02:00'); // CET (CEST)
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('countdownTimer').textContent = '🎉 EVENT START!';
      return;
    }
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);
    document.getElementById('countdownTimer').textContent = 
      `${days}d ${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
  }
  setInterval(updateCountdown, 1000);
  updateCountdown();

  // === Inicjalizacja ===
  window.addEventListener('load', async () => {
    const hasProfile = await loadProfile();
    await loadParticipants();
    if (hasProfile) {
      // automatyczne logowanie
    }
  });

  // === Event listeners ===
  loginBtn.addEventListener('click', () => {
    loginModal.classList.remove('hidden');
    if (currentUser) {
      nickInput.value = currentUser.nick;
      colorInput.value = currentUser.color;
    }
    colorStatus.textContent = '';
  });
  closeModalBtn.addEventListener('click', () => loginModal.classList.add('hidden'));
  saveProfileBtn.addEventListener('click', saveProfile);

  toggleParticipantsBtn.addEventListener('click', () => {
    participantListContainer.classList.toggle('expanded');
    toggleParticipantsBtn.textContent = participantListContainer.classList.contains('expanded') ? 'zwiń listę' : 'rozwiń listę';
    renderParticipants();
  });

  joinEventBtn.addEventListener('click', joinEvent);

  openChatBtn.addEventListener('click', openChat);
  sendMsgBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

  // Zamknięcie modala po kliknięciu w tło
  loginModal.addEventListener('click', (e) => {
    if (e.target === loginModal) loginModal.classList.add('hidden');
  });

  console.log('🌟 Aplikacja WIELKI EVENT uruchomiona');
</script>
</body>
</html>
