<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIELKI EVENT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Ekran ustawienia profilu -->
    <div id="setup-screen" class="screen">
        <div class="setup-container">
            <h2>Utwórz swój profil</h2>
            <input type="text" id="username-input" placeholder="Wprowadź pseudonim" maxlength="20">
            <div id="color-palette"></div>
            <p>Wybierz kolor nicku (zajęte kolory są szare)</p>
            <button id="save-profile-btn" class="btn-primary">Zapisz profil</button>
        </div>
    </div>

    <!-- Główna strona -->
    <div id="main-screen" class="screen hidden">
        <header>
            <h1 class="fire-text">WIELKI EVENT</h1>
            <div id="countdown"></div>
        </header>

        <main>
            <section class="event-info">
                <p><strong>Miejsce:</strong> <a href="https://maps.app.goo.gl/S7bJ817h2Nqgwkra8" target="_blank">Osiedle Barskie, Nowy Sącz</a></p>
            </section>

            <section class="banner-section">
                <button id="show-banner-btn" class="btn-primary">Baner eventu</button>
                <div id="banner-container" class="hidden">
                    <img src="foty/baner_event.jpg" alt="Baner eventu" id="event-banner">
                    <button id="download-banner-btn" class="btn-secondary">Pobierz baner do galerii</button>
                </div>
            </section>

            <section class="chat-section">
                <button id="open-chat-btn" class="btn-primary">Czat grupowy</button>
                <div id="chat-container" class="hidden">
                    <div id="chat-history"></div>
                    <div class="chat-input">
                        <input type="text" id="message-input" placeholder="Wpisz wiadomość..." maxlength="200">
                        <button id="send-message-btn" class="btn-send">Wyślij</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Firebase SDK (dodaj ręcznie z konsoli Firebase) -->
    <!-- <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script> -->

    <script src="script.js"></script>
</body>
</html>
